<div class="stat-card {{ color }}">
  <div class="stat-icon">
    <i class="bi bi-{{ icon }}"></i>
  </div>
  <div class="stat-label">{{ label }}</div>
  <div class="stat-value">{{ value }}</div>
  {% if change %}
    <div class="stat-change">
      <i class="bi bi-arrow-{% if change > 0 %}up{% else %}down{% endif %}"></i>
      {{ change }}% vs ayer
    </div>
  {% endif %}
</div>
