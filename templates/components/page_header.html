<div class="page-header">
  <div>
    <h1>{{ title }}</h1>
    {% if subtitle %}<p>{{ subtitle }}</p>{% endif %}
  </div>
  <div>
    {% if add_url %}
      <a href="{{ add_url }}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>{{ add_label|default:'Nuevo' }}
      </a>
    {% endif %}
  </div>
</div>
