{% load static %}
<header class="top-navbar">
  <div class="top-navbar-left">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <i class="bi bi-list"></i>
    </button>
    <span class="tab-title">{% block page_title %}{{ system_short_name }}{% endblock %}</span>
  </div>

  <div class="top-navbar-right">
    <div class="navbar-search d-none d-md-block">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Buscar clientas, citas..." id="globalSearch">
    </div>

    {% if user.is_authenticated %}
      <div class="dropdown">
        <a href="#" class="navbar-user dropdown-toggle" data-bs-toggle="dropdown">
          <div class="avatar-circle">
            {{ user.first_name|first|default:user.username|first|upper }}
          </div>
          <span class="d-none d-md-inline">{{ user.get_full_name|default:user.username }}</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><span class="dropdown-item-text text-muted small">{{ user.email }}</span></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="{% url 'accounts:logout' %}">
            <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
          </a></li>
        </ul>
      </div>
    {% endif %}
  </div>
</header>
