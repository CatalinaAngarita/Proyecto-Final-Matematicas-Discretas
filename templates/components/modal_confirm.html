<div class="modal fade" id="confirmDeleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center py-4">
        <div class="mb-3">
          <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
        </div>
        <h5 class="fw-semibold mb-2">Confirmar eliminación</h5>
        <p class="text-muted mb-0" id="confirmDeleteMessage">¿Estás seguro de eliminar este elemento?</p>
      </div>
      <div class="modal-footer border-0 pt-0 justify-content-center">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <form method="post" id="confirmDeleteForm" style="display: inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>
