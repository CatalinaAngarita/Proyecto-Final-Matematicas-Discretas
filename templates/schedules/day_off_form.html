{% extends 'base.html' %}
{% block title %}Nuevo día libre{% endblock %}
{% block page_title %}Nuevo día libre{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}<div class="col-md-6"><label class="form-label">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}</div>{% endfor %}
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar</button>
        <a href="{% url 'schedules:day_off_list' %}" class="btn btn-light">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
